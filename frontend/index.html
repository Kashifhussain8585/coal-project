<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Assembly Auth System</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <!-- LEFT -->

        <div class="left">

            <h1>AUTH</h1>

            <div class="line"></div>

            <p>
                Assembly Based Authentication System
                for COAL Project.
                Secure Login and Signup Interface
                using HTML, CSS, Python and x86 Assembly.
            </p>

            <button>
                Learn More
            </button>

        </div>



        <!-- RIGHT -->

        <div class="right">

            <h2>Login</h2>

            <form>

                <label>Username</label>

                <input
                    type="text"
                    placeholder="Enter Username"
                >


                <label>Password</label>

                <input
                    type="password"
                    placeholder="Enter Password"
                >


                <button class="submit">
                    Login
                </button>

            </form>


            <div class="icons">

                <span>🔒</span>
                <span>🛡️</span>
                <span>💻</span>

            </div>

        </div>

    </div>

</body>

</html>
