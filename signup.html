
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Signup</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <!-- LEFT -->

        <div class="left">

            <h1>SIGNUP</h1>

            <div class="line"></div>

            <p>
                Create a new account
                for secure access.
            </p>

        </div>



        <!-- RIGHT -->

        <div class="right">

            <h2>Signup</h2>

            <form>

                <label>Username</label>

                <input
                    type="text"
                    placeholder="Create Username"
                >


                <label>Password</label>

                <input
                    type="password"
                    placeholder="Create Password"
                >


                <button class="submit">
                    Create Account
                </button>

            </form>

        </div>

    </div>

</body>

</html>
