<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Assembly Auth System</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Background -->
  <div class="scanlines"></div>
  <div class="particles" id="particles"></div>

  <!-- Navbar -->
  <nav class="navbar">

    <div class="nav-logo">
      <div class="logo-icon">⬡</div>
      <span>ASM<span style="color:var(--purple)">AUTH</span></span>
    </div>

    <div class="nav-badge">
      Sign Up
    </div>

  </nav>

  <!-- Back -->
  <div class="back-nav">
    <a href="index.html" class="btn btn-ghost">← Home</a>
  </div>

  <!-- Signup -->
  <main class="auth-page">

    <div class="auth-wrapper">

      <div class="auth-card">

        <!-- Header -->
        <div class="auth-header">

          <div class="auth-icon">⚙️</div>

          <h1 class="auth-title">
            Create Account
          </h1>

          <p class="auth-subtitle">
            Register new user
          </p>

        </div>

        <!-- Alert -->
        <div id="signupAlert" class="alert-box"></div>

        <!-- Form -->
        <form id="signupForm" autocomplete="off">

          <!-- Username -->
          <div class="form-group">

            <label class="form-label">Username</label>

            <input
              type="text"
              id="signupUsername"
              class="form-input"
              placeholder="Enter username"
            />

          </div>

          <!-- Password -->
          <div class="form-group">

            <label class="form-label">Password</label>

            <input
              type="password"
              id="signupPassword"
              class="form-input"
              placeholder="Create password"
            />

          </div>

          <!-- Confirm Password -->
          <div class="form-group">

            <label class="form-label">Confirm Password</label>

            <input
              type="password"
              id="signupConfirm"
              class="form-input"
              placeholder="Confirm password"
            />

          </div>

          <!-- Submit -->
          <button type="submit" class="btn btn-submit">
            Create Account
          </button>

        </form>

        <!-- Login Link -->
        <div class="form-footer-center">
          <a href="login.html" class="form-link">
            Already have an account? Login →
          </a>
        </div>

      </div>

    </div>

  </main>

</body>

</html>
