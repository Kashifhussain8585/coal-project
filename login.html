
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <!-- LEFT -->

        <div class="left">

            <h1>LOGIN</h1>

            <div class="line"></div>

            <p>
                Enter your credentials
                to access the system.
            </p>

        </div>



        <!-- RIGHT -->

        <div class="right">

            <h2>Login</h2>

            <form>

                <label>Username</label>

                <input
                    type="text"
                    placeholder="Enter Username"
                >


                <label>Password</label>

                <input
                    type="password"
                    placeholder="Enter Password"
                >


                <button class="submit">
                    Login
                </button>

            </form>

        </div>

    </div>

</body>

</html>
