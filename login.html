<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Assembly Auth System</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Background -->
  <div class="scanlines"></div>
  <div class="particles" id="particles"></div>
  <div id="toast"></div>

  <!-- Navbar -->
  <nav class="navbar">

    <div class="nav-logo">
      <div class="logo-icon">⬡</div>
      <span>ASM<span style="color:var(--purple)">AUTH</span></span>
    </div>

    <div class="nav-badge">
      Login
    </div>

  </nav>

  <!-- Back -->
  <div class="back-nav">
    <a href="index.html" class="btn btn-ghost">← Home</a>
  </div>

  <!-- Login -->
  <main class="auth-page">

    <div class="auth-wrapper">

      <div class="auth-card">

        <!-- Header -->
        <div class="auth-header">
          <div class="auth-icon">🔓</div>
          <h1 class="auth-title">Login</h1>
          <p class="auth-subtitle">Enter your credentials</p>
        </div>

        <!-- Alert -->
        <div id="loginAlert" class="alert-box"></div>

        <!-- Form -->
        <form id="loginForm" autocomplete="off">

          <!-- Username -->
          <div class="form-group">

            <label for="loginUsername" class="form-label">
              Username
            </label>

            <input
              type="text"
              id="loginUsername"
              class="form-input"
              placeholder="Username"
              maxlength="20"
            />

            <span id="usernameError" class="field-error"></span>

          </div>

          <!-- Password -->
          <div class="form-group">

            <label for="loginPassword" class="form-label">
              Password
            </label>

            <div class="input-wrapper">

              <input
                type="password"
                id="loginPassword"
                class="form-input"
                placeholder="Password"
                maxlength="64"
              />

              <button
                type="button"
                class="pw-toggle"
                onclick="togglePassword('loginPassword', this)"
              >
                👁
              </button>

            </div>

            <span id="passwordError" class="field-error"></span>

          </div>

          <!-- Forgot -->
          <div class="form-footer">
            <a href="#" onclick="handleForgot(event)" class="form-link">
              Forgot password?
            </a>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn btn-submit" id="loginBtn">
            ⚡ Authenticate
          </button>

        </form>

        <!-- Terminal -->
        <div class="terminal-line" id="loginTerminal"></div>

        <!-- Security -->
        <div class="security-bar">
          Secure x86 Assembly Authentication
        </div>

        <!-- Signup -->
        <div class="form-footer-center">
          <a href="signup.html" class="form-link">
            Create account →
          </a>
        </div>

      </div>

    </div>

  </main>

  <!-- Footer -->
  <footer class="page-footer">

    <p class="footer-text">
      COAL Project — Assembly Auth System
    </p>

  </footer>

  <script src="script.js"></script>

  <script>
    function handleForgot(e) {
      e.preventDefault();
      showToast('Backend required for password recovery', 'info');
    }
  </script>

</body>
</html>
